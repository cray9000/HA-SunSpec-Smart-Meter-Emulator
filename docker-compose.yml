services:
  ha-sunspec-smart-meter-emulator:
    build: .
    container_name: ha-sunspec-smart-meter-emulator
    restart: unless-stopped
    ports:
      - "502:502"
      - "1502:1502"
      - "2502:2502"
      - "3502:3502"
      - "4502:4502"
      - "5502:5502"
      - "8080:8080"
    environment:
      HA_MODE: direct
      HA_BASE_URL: ${HA_BASE_URL}
      HA_TOKEN: ${HA_TOKEN}
      HA_WS_URL: ${HA_WS_URL:-}
      STATUS_PORT: 8080
      RESYNC_INTERVAL_S: ${RESYNC_INTERVAL_S:-300}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METERS_FILE: /config/meters.yaml
    volumes:
      - ./config:/config:ro
